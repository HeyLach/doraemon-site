<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 115">
  <!-- Head -->
  <circle cx="40" cy="27" r="23" fill="#0099cc"/>
  <!-- White face -->
  <ellipse cx="40" cy="36" rx="16" ry="14" fill="white"/>
  <!-- Eyes -->
  <circle cx="32" cy="22" r="7.5" fill="white"/>
  <circle cx="48" cy="22" r="7.5" fill="white"/>
  <circle cx="33" cy="23" r="4.5" fill="#111"/>
  <circle cx="49" cy="23" r="4.5" fill="#111"/>
  <circle cx="31" cy="21" r="1.8" fill="white"/>
  <circle cx="47" cy="21" r="1.8" fill="white"/>
  <!-- Nose -->
  <circle cx="40" cy="33" r="4" fill="#cc2200"/>
  <!-- Mouth -->
  <line x1="40" y1="37" x2="40" y2="43" stroke="#333" stroke-width="1.8"/>
  <path d="M29 44 Q40 52 51 44" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="12" y1="30" x2="32" y2="33" stroke="#333" stroke-width="1.5"/>
  <line x1="12" y1="36" x2="32" y2="36" stroke="#333" stroke-width="1.5"/>
  <line x1="12" y1="42" x2="32" y2="39" stroke="#333" stroke-width="1.5"/>
  <!-- Whiskers right -->
  <line x1="68" y1="30" x2="48" y2="33" stroke="#333" stroke-width="1.5"/>
  <line x1="68" y1="36" x2="48" y2="36" stroke="#333" stroke-width="1.5"/>
  <line x1="68" y1="42" x2="48" y2="39" stroke="#333" stroke-width="1.5"/>
  <!-- Collar -->
  <rect x="19" y="48" width="42" height="7" rx="3.5" fill="#dd2233"/>
  <!-- Bell -->
  <circle cx="40" cy="60" r="5.5" fill="#ffcc00"/>
  <circle cx="40" cy="57" r="1.5" fill="#cc9900"/>
  <!-- Left arm -->
  <ellipse cx="14" cy="68" rx="7" ry="5.5" fill="#0099cc" transform="rotate(-28 14 68)"/>
  <circle cx="8" cy="74" r="7" fill="#0099cc"/>
  <!-- Right arm -->
  <ellipse cx="66" cy="68" rx="7" ry="5.5" fill="#0099cc" transform="rotate(28 66 68)"/>
  <circle cx="72" cy="74" r="7" fill="#0099cc"/>
  <!-- Body -->
  <circle cx="40" cy="78" r="23" fill="#0099cc"/>
  <!-- White belly -->
  <ellipse cx="40" cy="81" rx="15" ry="17" fill="white"/>
  <!-- Pocket -->
  <ellipse cx="40" cy="92" rx="10" ry="4" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <!-- Legs -->
  <rect x="25" y="98" width="12" height="8" rx="4" fill="#0099cc"/>
  <rect x="43" y="98" width="12" height="8" rx="4" fill="#0099cc"/>
  <!-- Feet -->
  <ellipse cx="29" cy="108" rx="12" ry="5" fill="white"/>
  <ellipse cx="53" cy="108" rx="12" ry="5" fill="white"/>
</svg>
